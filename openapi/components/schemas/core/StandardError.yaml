# StandardError được sử dụng cho tất cả response.
type: object
required:
  - success
  - error
properties:
  success:
    type: boolean
    example: false
  error:
    type: object
    required:
      - code
      - message
    properties:
      code:
        type: integer
        description: >-
          Mã lỗi nội bộ của hệ thống:
          4102: Token không hợp lệ hoặc đã hết hạn
          4108: Không có quyền truy cập
          4004: Không tìm thấy dữ liệu
          4200: Dữ liệu không hợp lệ
        example: 4200
      message:
        type: string
        example: "Dữ liệu không hợp lệ"
      data:
        type: ["object", "null"]
