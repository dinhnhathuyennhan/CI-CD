apis:
  main:
    root: openapi.yaml

lint:
  extends:
    - recommended

theme:
  openapi:
    theme:
      colors:
        primary:
          main: '#7c6bbf'
        success:
          main: '#6db58a'
        warning:
          main: '#e6a96a'
        error:
          main: '#e07c7c'
        text:
          primary: '#3b3256'
          secondary: '#6b5f8e'
        border:
          light: '#e8e1ff'
          dark: '#c9bff5'
        responses:
          success:
            color: '#5a9e75'
            backgroundColor: '#edfaf3'
            tabTextColor: '#3d7a58'
          error:
            color: '#c05f5f'
            backgroundColor: '#fdf0f0'
            tabTextColor: '#a04040'
          redirect:
            color: '#b57a3a'
            backgroundColor: '#fef6ec'
            tabTextColor: '#8a5c28'
          info:
            color: '#5a7fc0'
            backgroundColor: '#eef3fd'
            tabTextColor: '#3a5ea0'
        http:
          get: '#6aab88'
          post: '#6a8fd4'
          put: '#c49a5e'
          delete: '#d47a7a'
          patch: '#b07ab8'
          head: '#8a7ab8'
          options: '#8aab8a'
      typography:
        fontSize: '15px'
        lineHeight: '1.7'
        fontFamily: 'Inter, sans-serif'
        headings:
          fontFamily: 'Inter, sans-serif'
          fontWeight: '600'
        code:
          fontSize: '13px'
          fontFamily: '"Fira Code", monospace'
          backgroundColor: '#f4f0ff'
          color: '#5a3fa8'
        links:
          color: '#7c6bbf'
          visited: '#9b86d4'
          hover: '#5a4a9e'
      sidebar:
        width: '270px'
        backgroundColor: '#f5f0ff'
        textColor: '#3b3256'
        groupItems:
          textTransform: 'uppercase'
        level1Items:
          textTransform: 'none'
        arrow:
          size: '1.2em'
          color: '#a78bfa'
      rightPanel:
        backgroundColor: '#2e2550'
        textColor: '#e8e0ff'
      codeBlock:
        backgroundColor: '#241d3d'
      spacing:
        unit: 5
        sectionHorizontal: 40
        sectionVertical: 40
      logo:
        gutter: '16px'
    generatedPayloadSamplesMaxDepth: 10
    maxDisplayedEnumValues: 10
    jsonSampleExpandLevel: 2
    hideSingleRequestSampleTab: true
    hideDownloadButton: false
    expandResponses: '200,201'
    requiredPropsFirst: true
    sortPropsAlphabetically: false
    showExtensions: false
    nativeScrollbars: false
