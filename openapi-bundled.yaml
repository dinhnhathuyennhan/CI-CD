openapi: 3.1.0
info:
  title: PA Vietnam Support API
  version: 1.0.0
  description: API cho hệ thống ticket hỗ trợ khách hàng
  contact:
    name: PA Vietnam
    email: dev@pavietnam.vn
servers:
  - url: https://apigateway.pavietnam.vn
    description: Production
security:
  - bearerAuth: []
tags:
  - name: Ticket
    description: Các API liên quan đến ticket hỗ trợ khách hàng
paths:
  /v1/users/{user_id}/tickets:
    post:
      summary: Tạo ticket hỗ trợ mới cho khách hàng
      operationId: createUserTicket
      description: Tạo ticket hỗ trợ mới cho khách hàng trong hệ thống. API yêu cầu user_id hợp lệ và thông tin ticket bao gồm tiêu đề, nội dung, mức độ ưu tiên.
      tags:
        - Ticket
      security:
        - bearerAuth: []
      x-permission: CHECK_NEWUPDATE
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardSuccess'
              example:
                success: true
                data: null
                error: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: 4200 | 4462
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardError'
        '500':
          $ref: '#/components/responses/InternalError'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateUserTicketRequest'
  /v1/users/{user_id}/tickets/{id}:
    get:
      summary: Xem chi tiết ticket của khách hàng
      operationId: getUserTicketDetail
      description: Hiển thị thông tin chi tiết của một ticket cụ thể thuộc về khách hàng. Chỉ khách hàng sở hữu ticket mới có quyền xem thông tin chi tiết.
      tags:
        - Ticket
      security:
        - bearerAuth: []
      x-permission: CHECK_NEWUPDATE
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardSuccess'
              example:
                success: true
                data: null
                error: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: '4200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardError'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/users/{user_id}/tickets/{id}/close:
    put:
      summary: Đóng ticket của khách hàng
      operationId: closeUserTicket
      description: API cho phép đóng một ticket cụ thể của khách hàng khi vấn đề đã được giải quyết. Ticket phải tồn tại và thuộc về user_id được chỉ định.
      tags:
        - Ticket
      security:
        - bearerAuth: []
      x-permission: CHECK_NEWUPDATE
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardSuccess'
              example:
                success: true
                data: null
                error: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: 4200 | 4463 | 4464
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardError'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/users/{user_id}/tickets/{id}/reopen:
    post:
      summary: Mở lại ticket đã đóng của khách hàng
      operationId: reopenUserTicket
      description: API cho phép mở lại ticket đã đóng trước đó của khách hàng. Ticket chỉ có thể được mở lại khi đang ở trạng thái đã đóng và trong khoảng thời gian cho phép theo chính sách.
      tags:
        - Ticket
      security:
        - bearerAuth: []
      x-permission: CHECK_NEWUPDATE
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardSuccess'
              example:
                success: true
                data: null
                error: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: 4200 | 4466 | 4467
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardError'
        '500':
          $ref: '#/components/responses/InternalError'
      requestBody:
        required: false
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ReopenUserTicketRequest'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    CreateUserTicketRequest:
      type: object
      properties:
        department_id:
          type: integer
          description: Phòng ban muốn được hỗ trợ
        service_id:
          type: integer
          description: Dịch vụ cần hỗ trợ
        title:
          type: string
          description: Tiêu đề
        descriptions:
          type: string
          maxLength: 4000
          description: Nội dung yêu cầu -  Tối đa 4000 ký tự
        files:
          type: array
          items:
            type: string
            format: binary
          maxItems: 3
          description: 'Tệp đính kèm -  Tối đa 3 files -  Tối đa 10MB mỗi file -  Chỉ chấp nhận định dạng: .gif, .jpg, .jpeg, .png, .svg, .bmp, .pdf, .zip, .rar'
      required:
        - department_id
        - service_id
        - title
        - descriptions
    StandardSuccess:
      type: object
      required:
        - success
        - error
        - data
      properties:
        success:
          type: boolean
          example: true
        error:
          type:
            - 'null'
          example: null
        data:
          description: Dữ liệu trả về tuỳ vào từng endpoint khác nhau
    StandardError:
      type: object
      required:
        - success
        - error
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: integer
              description: 'Mã lỗi nội bộ của hệ thống: 4102: Token không hợp lệ hoặc đã hết hạn 4108: Không có quyền truy cập 4004: Không tìm thấy dữ liệu 4200: Dữ liệu không hợp lệ'
              example: 4200
            message:
              type: string
              example: Dữ liệu không hợp lệ
            data:
              type:
                - object
                - 'null'
    ReopenUserTicketRequest:
      type: object
      properties:
        descriptions:
          type: string
          maxLength: 4000
          description: Nội dung -  Tối đa 4000 ký tự
        files:
          type: array
          items:
            type: string
            format: binary
          maxItems: 3
          description: 'Tệp đính kèm -  Tối đa 3 files -  Tối đa 10MB mỗi file -  Chỉ chấp nhận định dạng: .gif, .jpg, .jpeg, .png, .svg, .bmp, .pdf, .zip, .rar'
  responses:
    Unauthorized:
      description: Token không hợp lệ hoặc đã hết hạn - Mã lỗi 4102
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
          example:
            success: false
            error:
              code: 4102
              message: Token không hợp lệ hoặc đã hết hạn
              data: null
    Forbidden:
      description: IP không hợp lệ - Mã lỗi 4108
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
          example:
            success: false
            error:
              code: 4108
              message: IP không được phép truy cập
              data: null
    NotFound:
      description: Không tim thấy dữ liệu - Mã lỗi 4004
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
          example:
            success: false
            error:
              code: 4004
              message: Không tìm thấy dữ liệu
              data: null
    InternalError:
      description: Lỗi server không mong muốn
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
          example:
            success: false
            error:
              code: 500
              message: Lỗi hệ thống, vui lòng thử lại sau
              data:
                type:
                  - null
