put:
  summary: Đóng ticket hỗ trợ
  operationId: closeTicket
  description: Đóng một ticket hỗ trợ. Sau khi đóng khách hàng có thể mở lại trong vòng 2 tháng.
  tags:
    - Ticket
  security:
    - bearerAuth: []
  parameters:
    - name: user_id
      in: path
      required: true
      schema:
        type: string
    - name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    "200":
      description: Đóng ticket thành công
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/core/StandardSuccess.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "500":
      $ref: "../../components/responses/InternalError.yaml"
