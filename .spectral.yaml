functions:
  - ./functions/private-must-have-401-403

rules:
  # Rule no-inline-schema đã tắt vì được check bằng script riêng
  # Xem scripts/lint-all.sh

  # operationId phải verbNoun
  operation-id-verb-noun:
    message: >
      operationId "{{value}}" sai format.
      Phải dùng camelCase — ví dụ: listUsers, createOrder, reopenTicket.
    severity: error
    given: "$.paths[*][*].operationId"
    then:
      function: pattern
      functionOptions:
        match: "^[a-z][a-zA-Z0-9]+$"

  # Trường id phải có readOnly: true
  schema-id-must-be-readonly:
    message: >
      Trường "id" trong schema phải có readOnly: true.
      ID được server tự generate, client không được gửi lên.
    severity: error
    given: "$.components.schemas[*].properties.id"
    then:
      field: "readOnly"
      function: truthy

  # Trường created_at phải có readOnly: true
  schema-created-at-must-be-readonly:
    message: >
      Trường "created_at" trong schema phải có readOnly: true.
      Timestamp được server tự generate, client không được gửi lên.
    severity: error
    given: "$.components.schemas[*].properties.created_at"
    then:
      field: "readOnly"
      function: truthy

  # Trường updated_at phải có readOnly: true
  schema-updated-at-must-be-readonly:
    message: >
      Trường "updated_at" trong schema phải có readOnly: true.
      Timestamp được server tự generate, client không được gửi lên.
    severity: error
    given: "$.components.schemas[*].properties.updated_at"
    then:
      field: "readOnly"
      function: truthy

  private-endpoint-must-have-401-403:
    message: "{{error}}"
    severity: error
    given: "$.paths[*][*]"
    then:
      function: private-must-have-401-403

  # Mọi operation phải có response 500 (Internal Server Error)
  operation-must-have-500:
    message: >
      Operation thiếu response 500 (Internal Server Error).
      Mọi API đều có thể gặp lỗi server, nên phải khai báo response 500.
    severity: warn
    given: "$.paths[*][*]"
    then:
      field: "responses.500"
      function: truthy

  # Mọi operation phải có response 404 cho GET/PUT/PATCH/DELETE với path parameter
  operation-with-id-must-have-404:
    message: >
      Operation với path parameter phải có response 404 (Not Found).
    severity: warn
    given: "$.paths[*][get,put,patch,delete]"
    then:
      field: "responses.404"
      function: truthy

  operation-must-have-summary:
    message: Operation phải có summary.
    severity: warn
    given: "$.paths[*][*]"
    then:
      field: "summary"
      function: truthy

  operation-must-have-description:
    message: Operation phải có description.
    severity: warn
    given: "$.paths[*][*]"
    then:
      field: "description"
      function: truthy

  schema-properties-must-have-description:
    message: Property "{{property}}" phải có description.
    severity: info
    given: "$.components.schemas[*]"
    then:
      field: "description"
      function: truthy

  enum-schema-must-have-description:
    message: Schema có enum phải có description giải thích ý nghĩa.
    severity: warn
    given: "$.components.schemas[*].properties[*][?(@.enum)]"
    then:
      field: "description"
      function: truthy

  path-params-must-be-required:
    message: Path parameter phải có required: true
    severity: error
    given: "$.paths[*][*].parameters[?(@.in=='path')]"
    then:
      field: "required"
      function: truthy

  path-kebab-case:
    message: Path phải dùng kebab-case.
    severity: warn
    given: "$.paths.*~"
    then:
      function: pattern
      functionOptions:
        match: "^(/[a-z0-9-]+|/{[a-zA-Z0-9_]+})+$"

  response-200-must-have-content:
    message: Response 200 phải có content/schema.
    severity: info
    given: "$.paths[*][get,put,patch].responses.200"
    then:
      field: "content"
      function: truthy

  post-create-should-have-201:
    message: POST nên trả response 201 Created.
    severity: info
    given: "$.paths[*].post.responses"
    then:
      field: "201"
      function: truthy
