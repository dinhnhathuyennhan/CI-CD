get:
  summary: Lấy chi tiết ticket
  operationId: getTicketDetail
  description: Lấy thông tin chi tiết một ticket bao gồm trạng thái, phòng ban, nhân viên và lịch sử trao đổi.
  tags:
    - Ticket
  security:
    - bearerAuth: []
  parameters:
    - name: user_id
      in: path
      required: true
      schema:
        type: string
    - name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    "200":
      description: Lấy chi tiết thành công
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/core/StandardSuccess.yaml"
    "401":
            $ref: "../../components/responses/Unauthorized.yaml"
    "404":
            $ref: "../../components/responses/NotFound.yaml"
    "403":
            $ref: "../../components/responses/Forbidden.yaml"
    "500":
            $ref: "../../components/responses/InternalError.yaml"