post:
  summary: Tạo ticket hỗ trợ mới
  operationId: createTicket
  description: Tạo một yêu cầu hỗ trợ mới cho khách hàng, hỗ trợ đính kèm file.
  tags:
    - Ticket
  security:
    - bearerAuth: []
  parameters:
    - name: user_id
      in: path
      required: true
      schema:
        type: string
      description: UID của khách hàng phải trùng với user_id trong token
  requestBody:
    required: true
    content:
      multipart/form-data:
        schema:
          $ref: "../../components/schemas/ticket/CreateTicketRequest.yaml"
  responses:
    "200":
      description: Tạo ticket thành công
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/core/StandardSuccess.yaml"
    "401":
            $ref: "../../components/responses/Unauthorized.yaml"
    "403":
            $ref: "../../components/responses/Forbidden.yaml"
    "422":
           $ref: "../../components/responses/ValidationError.yaml"
    "500":
           $ref: "../../components/responses/InternalError.yaml"
