# Response cho API nhận lại khi thành công
# Data thay đổi tuỳ vào từng endpoint khác nhau
type: object
required:
  - success
  - error
  - data
properties:
  success:
    type: boolean
    example: true
  error:
    type: ["null"]
    example: null
  data:
    description: "Dữ liệu trả về tuỳ vào từng endpoint khác nhau"
