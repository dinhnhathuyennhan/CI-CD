<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>P.A DEV API Documentation</title>
  <link rel="stylesheet" type="text/css" href="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui.css" />
  <link rel="icon" type="image/png" href="https://unpkg.com/swagger-ui-dist@5.11.0/favicon-32x32.png" sizes="32x32" />
  <link rel="icon" type="image/png" href="https://unpkg.com/swagger-ui-dist@5.11.0/favicon-16x16.png" sizes="16x16" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* ═══════════════════════════════════════════════════════════
       PASTEL THEME - Swagger UI Custom Styling
       ═══════════════════════════════════════════════════════════ */

    * {
      box-sizing: border-box;
    }

    html {
      box-sizing: border-box;
      overflow: -moz-scrollbars-vertical;
      overflow-y: scroll;
    }

    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #fef5ff 0%, #f0f9ff 100%);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* ── Custom Header Banner ── */
    .custom-header {
      background: linear-gradient(135deg, #e9d5ff 0%, #dbeafe 100%);
      border-bottom: 2px solid #c4b5fd;
      padding: 20px 40px;
      box-shadow: 0 2px 8px rgba(139, 92, 246, 0.1);
    }

    .custom-header h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #7c3aed 0%, #2563eb 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .custom-header p {
      margin: 8px 0 0 0;
      color: #6b7280;
      font-size: 14px;
      font-weight: 400;
    }

    .custom-header .version-badge {
      display: inline-block;
      background: #fef3c7;
      color: #92400e;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      margin-left: 12px;
      border: 1px solid #fcd34d;
    }

    /* ── Swagger UI Container ── */
    #swagger-ui {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    /* ── Info Section ── */
    .swagger-ui .info {
      margin: 30px 0;
      padding: 30px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.08);
      border: 1px solid #e9d5ff;
    }

    .swagger-ui .info .title {
      font-size: 32px;
      font-weight: 700;
      color: #7c3aed;
      margin-bottom: 12px;
    }

    .swagger-ui .info .description {
      color: #6b7280;
      line-height: 1.7;
      font-size: 15px;
    }

    /* ── Operation Blocks ── */
    .swagger-ui .opblock {
      margin: 20px 0;
      border-radius: 12px;
      border: 2px solid;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      overflow: hidden;
      transition: all 0.2s ease;
    }

    .swagger-ui .opblock:hover {
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      transform: translateY(-2px);
    }

    /* ── HTTP Method Colors (Pastel) ── */
    .swagger-ui .opblock.opblock-get {
      border-color: #a7f3d0;
      background: #f0fdf4;
    }

    .swagger-ui .opblock.opblock-get .opblock-summary-method {
      background: #6ee7b7;
      color: #065f46;
    }

    .swagger-ui .opblock.opblock-post {
      border-color: #bfdbfe;
      background: #eff6ff;
    }

    .swagger-ui .opblock.opblock-post .opblock-summary-method {
      background: #93c5fd;
      color: #1e3a8a;
    }

    .swagger-ui .opblock.opblock-put {
      border-color: #fed7aa;
      background: #fffbeb;
    }

    .swagger-ui .opblock.opblock-put .opblock-summary-method {
      background: #fdba74;
      color: #7c2d12;
    }

    .swagger-ui .opblock.opblock-delete {
      border-color: #fecaca;
      background: #fef2f2;
    }

    .swagger-ui .opblock.opblock-delete .opblock-summary-method {
      background: #fca5a5;
      color: #7f1d1d;
    }

    .swagger-ui .opblock.opblock-patch {
      border-color: #e9d5ff;
      background: #faf5ff;
    }

    .swagger-ui .opblock.opblock-patch .opblock-summary-method {
      background: #d8b4fe;
      color: #581c87;
    }

    /* ── Operation Summary ── */
    .swagger-ui .opblock-summary {
      padding: 16px 20px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .swagger-ui .opblock-summary:hover {
      background: rgba(255, 255, 255, 0.5);
    }

    .swagger-ui .opblock-summary-method {
      font-size: 13px;
      font-weight: 700;
      min-width: 80px;
      padding: 8px 16px;
      text-align: center;
      border-radius: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-family: 'Fira Code', monospace;
    }

    .swagger-ui .opblock-summary-path {
      font-size: 15px;
      font-weight: 600;
      color: #374151;
      font-family: 'Fira Code', monospace;
      flex-grow: 1;
      padding: 0 16px;
    }

    .swagger-ui .opblock-summary-description {
      color: #6b7280;
      font-size: 14px;
    }

    /* ── Parameters & Responses ── */
    .swagger-ui .opblock-body {
      padding: 24px;
      background: white;
    }

    .swagger-ui .parameters-col_description {
      color: #6b7280;
      font-size: 14px;
    }

    .swagger-ui .parameter__name {
      font-weight: 600;
      color: #374151;
      font-family: 'Fira Code', monospace;
    }

    .swagger-ui .parameter__type {
      color: #7c3aed;
      font-size: 12px;
      font-family: 'Fira Code', monospace;
    }

    /* ── Response Tabs ── */
    .swagger-ui .responses-inner {
      padding: 20px;
      background: #f9fafb;
      border-radius: 8px;
    }

    .swagger-ui .response-col_status {
      font-weight: 700;
      font-family: 'Fira Code', monospace;
    }

    .swagger-ui .response-col_status.response-200,
    .swagger-ui .response-col_status.response-201 {
      color: #059669;
    }

    .swagger-ui .response-col_status.response-400,
    .swagger-ui .response-col_status.response-404 {
      color: #dc2626;
    }

    /* ── Code Blocks ── */
    .swagger-ui .highlight-code {
      background: #1e293b;
      border-radius: 8px;
      padding: 16px;
    }

    .swagger-ui .highlight-code pre {
      color: #e2e8f0;
      font-family: 'Fira Code', monospace;
      font-size: 13px;
      line-height: 1.6;
    }

    /* ── Models Section ── */
    .swagger-ui .model-box {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin: 16px 0;
      border: 2px solid #e9d5ff;
      box-shadow: 0 2px 8px rgba(139, 92, 246, 0.06);
    }

    .swagger-ui .model-title {
      font-size: 18px;
      font-weight: 600;
      color: #7c3aed;
      margin-bottom: 12px;
    }

    .swagger-ui .model {
      font-family: 'Fira Code', monospace;
      font-size: 13px;
    }

    /* ── Buttons ── */
    .swagger-ui .btn {
      border-radius: 8px;
      font-weight: 600;
      padding: 10px 20px;
      font-size: 14px;
      transition: all 0.2s ease;
      border: none;
      cursor: pointer;
    }

    .swagger-ui .btn.execute {
      background: linear-gradient(135deg, #7c3aed 0%, #2563eb 100%);
      color: white;
      box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
    }

    .swagger-ui .btn.execute:hover {
      box-shadow: 0 6px 16px rgba(124, 58, 237, 0.4);
      transform: translateY(-2px);
    }

    .swagger-ui .btn.cancel {
      background: #f3f4f6;
      color: #374151;
    }

    .swagger-ui .btn.cancel:hover {
      background: #e5e7eb;
    }

    /* ── Try it out ── */
    .swagger-ui .try-out__btn {
      background: #fef3c7;
      color: #92400e;
      border: 2px solid #fcd34d;
      font-weight: 600;
    }

    .swagger-ui .try-out__btn:hover {
      background: #fde68a;
    }

    /* ── Input Fields ── */
    .swagger-ui input[type=text],
    .swagger-ui input[type=password],
    .swagger-ui input[type=email],
    .swagger-ui textarea,
    .swagger-ui select {
      border: 2px solid #e9d5ff;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: 'Fira Code', monospace;
      transition: border-color 0.2s ease;
    }

    .swagger-ui input[type=text]:focus,
    .swagger-ui input[type=password]:focus,
    .swagger-ui input[type=email]:focus,
    .swagger-ui textarea:focus,
    .swagger-ui select:focus {
      outline: none;
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar {
      width: 12px;
      height: 12px;
    }

    ::-webkit-scrollbar-track {
      background: #f3f4f6;
    }

    ::-webkit-scrollbar-thumb {
      background: #c4b5fd;
      border-radius: 6px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #a78bfa;
    }

    /* ── Authorization ── */
    .swagger-ui .auth-wrapper {
      background: white;
      border-radius: 12px;
      /* padding: 24px;
      border: 2px solid #e9d5ff;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.08); */
    }

    .swagger-ui .auth-btn-wrapper {
      padding: 16px 0;
    }

    .swagger-ui .authorize {
      background: linear-gradient(135deg, #7c3aed 0%, #2563eb 100%);
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      font-weight: 600;
      box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
    }

    .swagger-ui .authorize:hover {
      box-shadow: 0 6px 16px rgba(124, 58, 237, 0.4);
      transform: translateY(-2px);
    }

    /* ── Topbar (Hide default) ── */
    .swagger-ui .topbar {
      display: none;
    }

    /* ── Scheme Container ── */
    .swagger-ui .scheme-container {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin: 20px 0;
      border: 2px solid #e9d5ff;
      box-shadow: 0 2px 8px rgba(139, 92, 246, 0.06);
    }
  </style>
</head>

<body>
  <div class="custom-header">
    <h1>
      P.A DEV API Documentation
    </h1>
    <p>Internal API Documentation - Support Ticket System</p>
  </div>

  <div id="swagger-ui"></div>

  <script src="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui-bundle.js" charset="UTF-8"></script>
  <script src="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui-standalone-preset.js" charset="UTF-8"></script>
  <script>
    window.onload = function() {
      const spec = `openapi: 3.1.0
info:
  title: PA Vietnam Support API
  version: 1.0.0
  description: API cho hệ thống ticket hỗ trợ khách hàng
  contact:
    name: PA Vietnam
    email: dev@pavietnam.vn
servers:
  - url: https://apigateway.pavietnam.vn
    description: Production
security:
  - bearerAuth: []
tags:
  - name: Ticket
    description: Các API liên quan đến ticket hỗ trợ khách hàng
paths:
  /v1/users/{user_id}/tickets:
    post:
      summary: Tạo ticket hỗ trợ mới
      operationId: createTicket
      description: Tạo một yêu cầu hỗ trợ mới cho khách hàng, hỗ trợ đính kèm file.
      tags:
        - Ticket
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
          description: UID của khách hàng phải trùng với user_id trong token
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              \$ref: '#/components/schemas/CreateTicketRequest'
      responses:
        '201':
          description: Tạo ticket thành công
          content:
            application/json:
              schema:
                \$ref: '#/components/schemas/StandardSuccess'
        '401':
          \$ref: '#/components/responses/Unauthorized'
        '403':
          \$ref: '#/components/responses/Forbidden'
        '422':
          \$ref: '#/components/responses/ValidationError'
        '500':
          \$ref: '#/components/responses/InternalError'
  /v1/users/{user_id}/tickets/{id}:
    get:
      summary: Lấy chi tiết ticket
      operationId: getTicketDetail
      description: Lấy thông tin chi tiết một ticket bao gồm trạng thái, phòng ban, nhân viên và lịch sử trao đổi.
      tags:
        - Ticket
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Lấy chi tiết thành công
          content:
            application/json:
              schema:
                \$ref: '#/components/schemas/StandardSuccess'
        '401':
          \$ref: '#/components/responses/Unauthorized'
        '403':
          \$ref: '#/components/responses/Forbidden'
        '404':
          \$ref: '#/components/responses/NotFound'
        '500':
          \$ref: '#/components/responses/InternalError'
  /v1/users/{user_id}/tickets/{id}/close:
    put:
      summary: Đóng ticket hỗ trợ
      operationId: closeTicket
      description: Đóng một ticket hỗ trợ. Sau khi đóng khách hàng có thể mở lại trong vòng 2 tháng.
      tags:
        - Ticket
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Đóng ticket thành công
          content:
            application/json:
              schema:
                \$ref: '#/components/schemas/StandardSuccess'
        '401':
          \$ref: '#/components/responses/Unauthorized'
        '403':
          \$ref: '#/components/responses/Forbidden'
        '404':
          \$ref: '#/components/responses/NotFound'
        '500':
          \$ref: '#/components/responses/InternalError'
  /v1/users/{user_id}/tickets/{id}/reopen:
    post:
      summary: Mở lại ticket đã đóng
      operationId: updateTicketReopen
      description: |
        Mở lại một ticket đã đóng. Chỉ thực hiện được khi ticket đang ở trạng thái đóng (trangthai = 2) và thời gian đóng trong vòng 2 tháng gần nhất. Nếu không truyền descriptions, hệ thống tự điền "MỞ LẠI CÂU HỎI".
      tags:
        - Ticket
      security:
        - bearerAuth: []
      x-permission: CHECK_NEWUPDATE
      parameters:
        - \$ref: '#/components/parameters/UserId'
        - \$ref: '#/components/parameters/TicketId'
        - \$ref: '#/components/parameters/XRequestId'
      requestBody:
        required: false
        content:
          multipart/form-data:
            schema:
              \$ref: '#/components/schemas/ReopenTicketRequest'
      responses:
        '201':
          description: Mở lại ticket thành công
          content:
            application/json:
              schema:
                \$ref: '#/components/schemas/StandardSuccess'
              example:
                success: true
                data: null
                error: null
        '401':
          \$ref: '#/components/responses/Unauthorized'
        '403':
          \$ref: '#/components/responses/Forbidden'
        '404':
          \$ref: '#/components/responses/NotFound'
        '422':
          description: |
            4200 — dữ liệu không hợp lệ. 4466 — quá thời hạn 2 tháng. 4467 — ticket đang mở.
          content:
            application/json:
              schema:
                \$ref: '#/components/schemas/StandardError'
              examples:
                validation_error:
                  summary: Dữ liệu không hợp lệ
                  value:
                    success: false
                    error:
                      code: 4200
                      message: Dữ liệu request không hợp lệ
                      data: null
                expired:
                  summary: Quá thời hạn mở lại
                  value:
                    success: false
                    error:
                      code: 4466
                      message: Quá thời hạn cho phép mở lại
                      data: null
                already_open:
                  summary: Ticket đang mở
                  value:
                    success: false
                    error:
                      code: 4467
                      message: Câu hỏi đang được mở
                      data: null
        '500':
          \$ref: '#/components/responses/InternalError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    basicAuth:
      type: http
      scheme: basic
  schemas:
    CreateTicketRequest:
      type: object
      required:
        - department_id
        - service_id
        - title
        - description
      properties:
        department_id:
          type: integer
          description: ID của phòng ban muốn tạo ticket
          example: 3
        service_id:
          type: integer
          description: ID của dịch vụ muốn tạo ticket
          example: 101
        title:
          type: string
          description: Tiêu đề của ticket
          example: Lỗi không thể đăng nhập
        description:
          type: string
          maxLength: 4000
          description: Mô tả chi tiết của ticket
          example: Người dùng không thể đăng nhập vào hệ thống sau khi cập nhật phần mềm.
        files:
          type: array
          description: |
            Tệp đính kèm (Không bắt buộc). Tối đa 3 file, mỗi file tối đa 10MB. Định dạng chấp nhận: .gif, .jpg, .jpeg, .png, .svg, .bmp, .pdf, .zip, .rar
          maxItems: 3
          items:
            type: string
            format: binary
    StandardSuccess:
      type: object
      required:
        - success
        - error
        - data
      properties:
        success:
          type: boolean
          example: true
        error:
          type:
            - 'null'
          example: null
        data:
          description: Dữ liệu trả về tuỳ vào từng endpoint khác nhau
    StandardError:
      type: object
      required:
        - success
        - error
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: integer
              description: 'Mã lỗi nội bộ của hệ thống: 4102: Token không hợp lệ hoặc đã hết hạn 4108: Không có quyền truy cập 4004: Không tìm thấy dữ liệu 4200: Dữ liệu không hợp lệ'
              example: 4200
            message:
              type: string
              example: Dữ liệu không hợp lệ
            data:
              type:
                - object
                - 'null'
    FileAttachment:
      type: object
      properties:
        url:
          type: string
          format: uri
          description: URL của file đính kèm
          example: https://example.pavietnam.vn/support/files/help.pdf
        category:
          type: string
          enum:
            - image
            - document
            - other
            - video
            - archive
          description: 'Phân loại file: ảnh, video, tài liệu, archive (nén), hoặc khác.'
          example: document
    ReopenTicketRequest:
      type: object
      properties:
        description:
          type: string
          maxLength: 4000
          description: |
            Mô tả lý do mở lại ticket, tối đa 4000 ký tự. Nếu không cung cấp, hệ thống mặc định sẽ là "MỞ LẠI CÂU HỎI"
          example: Khách hàng cần thêm thông tin về cách sử dụng sản phẩm.
        files:
          type: array
          maxItems: 3
          description: Danh sách file đính kèm hỗ trợ cho việc mở lại ticket. Tối đa 3 file, mỗi file tối đa 10MB.
          items:
            \$ref: '#/components/schemas/FileAttachment'
  responses:
    Unauthorized:
      description: Token không hợp lệ hoặc đã hết hạn - Mã lỗi 4102
      content:
        application/json:
          schema:
            \$ref: '#/components/schemas/StandardError'
          example:
            success: false
            error:
              code: 4102
              message: Token không hợp lệ hoặc đã hết hạn
              data: null
    Forbidden:
      description: IP không hợp lệ - Mã lỗi 4108
      content:
        application/json:
          schema:
            \$ref: '#/components/schemas/StandardError'
          example:
            success: false
            error:
              code: 4108
              message: IP không được phép truy cập
              data: null
    ValidationError:
      description: Dữ liệu request không hợp lệ - Mã lỗi 4200
      content:
        application/json:
          schema:
            \$ref: '#/components/schemas/StandardError'
          example:
            success: false
            error:
              code: 4200
              message: Dữ liệu request không hợp lệ
              data: null
    InternalError:
      description: Lỗi server không mong muốn
      content:
        application/json:
          schema:
            \$ref: '#/components/schemas/StandardError'
          example:
            success: false
            error:
              code: 500
              message: Lỗi hệ thống, vui lòng thử lại sau
              data:
                type:
                  - null
    NotFound:
      description: Không tim thấy dữ liệu - Mã lỗi 4004
      content:
        application/json:
          schema:
            \$ref: '#/components/schemas/StandardError'
